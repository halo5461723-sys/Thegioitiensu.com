<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RPG Web Game Fixed</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .box { border: 1px solid #444; padding: 15px; margin: 10px 0; border-radius: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h2>Đăng nhập/Đăng ký</h2>
        <input id="user" placeholder="Tài khoản"><br><br>
        <input id="pass" type="password" placeholder="Mật khẩu"><br><br>
        <button onclick="login()">Vào game</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="box" id="stats"></div>
        <div id="monster-list"></div>
        <div id="shop-list" class="box"></div>
    </div>

    <script>
        let SOMALIA_V14_DATA_player = null;
        let currentUserId = "";

        // Định nghĩa quái với chỉ số giáp (defense) để giảm sát thương bạn gây ra
        const monsters = [
            {id: 0, name: "Slime", hp: 10, gold: 50, def: 0},
            {id: 1, name: "Vua Slime", hp: 100, gold: 500, def: 2},
            {id: 2, name: "Người xương", hp: 500, gold: 2500, def: 5},
            {id: 3, name: "Chiến binh xương", hp: 700, gold: 4500, def: 8}
        ];

        function login() {
            let user = document.getElementById('user').value;
            let pass = document.getElementById('pass').value;
            if(!user || !pass) return;

            currentUserId = user + "_" + pass;
            SOMALIA_V14_DATA_player = JSON.parse(localStorage.getItem(currentUserId)) || {
                name: user, hp: 100, baseDame: 10, gold: 0, weaponDame: 0, maxMonsterId: 0
            };

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderGame();
        }

        function renderGame() {
            document.getElementById('stats').innerHTML = `TK: ${SOMALIA_V14_DATA_player.name} | Vàng: ${SOMALIA_V14_DATA_player.gold}$ | HP: ${SOMALIA_V14_DATA_player.hp.toFixed(0)}`;
            
            let mList = "<h3>Săn quái:</h3>";
            monsters.forEach(m => {
                if (m.id <= SOMALIA_V14_DATA_player.maxMonsterId) {
                    mList += `<button onclick="fight(${m.id})">${m.name} (Phần thưởng ${m.gold}$)</button> `;
                }
            });
            document.getElementById('monster-list').innerHTML = mList;

            // ... (Phần shop giữ nguyên như cũ)
        }

        function fight(id) {
            let m = monsters[id];
            let damageDealt = Math.max(1, (SOMALIA_V14_DATA_player.baseDame + SOMALIA_V14_DATA_player.weaponDame) - m.def);
            
            // Logic: Nếu dame gây ra không đủ giết quái trong 1 hit, bạn bị phản dame
            let reflect = (damageDealt * 0.4); 
            
            if (damageDealt < m.hp) {
                alert("Quái quá mạnh! Bạn chỉ gây được " + damageDealt + " sát thương.");
                SOMALIA_V14_DATA_player.hp -= reflect;
            } else {
                alert("Đánh bại " + m.name + "! Nhận " + m.gold + "$");
                SOMALIA_V14_DATA_player.gold += m.gold;
                // Mở khóa quái tiếp theo nếu giết quái hiện tại
                if(id == SOMALIA_V14_DATA_player.maxMonsterId) SOMALIA_V14_DATA_player.maxMonsterId++;
            }

            if(SOMALIA_V14_DATA_player.hp <= 0) { SOMALIA_V14_DATA_player.hp = 100; alert("Bạn đã gục ngã!"); }
            
            saveGame();
            renderGame();
        }
        
        function saveGame() { localStorage.setItem(currentUserId, JSON.stringify(SOMALIA_V14_DATA_player)); }
    </script>
</body>
</html>
