<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RPG Web Game Premium</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
        .hidden { display: none; }
        .box { border: 1px solid #555; padding: 15px; margin-bottom: 10px; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h2>Đăng nhập / Đăng ký</h2>
        <input id="user" placeholder="Tên tài khoản">
        <button onclick="login()">Vào game</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="box" id="stats"></div>
        
        <h3>Chọn quái để săn:</h3>
        <div id="monster-list"></div>

        <h3>Shop Vũ khí:</h3>
        <div id="shop-list"></div>
    </div>

    <script>
        // Khởi tạo dữ liệu
        let SOMALIA_V14_DATA_player = JSON.parse(localStorage.getItem('myRPG_Data')) || {
            name: "", race: "", hp: 100, baseDame: 20, gold: 0, exp: 0, level: 1, dmgReduction: 0, weaponDame: 0
        };

        const monsters = [
            {name: "Slime", hp: 10, gold: 50},
            {name: "Vua Slime", hp: 100, gold: 500},
            {name: "Người xương", hp: 500, gold: 2500},
            {name: "Chiến binh xương", hp: 700, gold: 4500}
        ];

        const weapons = [
            {name: "Cây gậy", cost: 50, dame: 12},
            {name: "Kiếm sắt", cost: 250, dame: 30},
            {name: "Kiếm lego", cost: 1200, dame: 120},
            {name: "Kiếm truy kích", cost: 5000, dame: 2999}
        ];

        function login() {
            SOMALIA_V14_DATA_player.name = document.getElementById('user').value;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderGame();
        }

        function renderGame() {
            document.getElementById('stats').innerHTML = `Tên: ${SOMALIA_V14_DATA_player.name} | Vàng: ${SOMALIA_V14_DATA_player.gold}$ | Máu: ${SOMALIA_V14_DATA_player.hp.toFixed(0)}`;
            
            // Render Quái
            let mList = "";
            monsters.forEach(m => mList += `<button onclick="fight('${m.name}', ${m.hp}, ${m.gold})">${m.name} (${m.hp} Máu)</button>`);
            document.getElementById('monster-list').innerHTML = mList;

            // Render Shop
            let sList = "";
            weapons.forEach(w => sList += `<button onclick="buy('${w.name}', ${w.cost}, ${w.dame})">${w.name} - ${w.cost}$ (${w.dame} Dame)</button>`);
            document.getElementById('shop-list').innerHTML = sList;
        }

        function fight(name, hp, gold) {
            let totalDame = SOMALIA_V14_DATA_player.baseDame + SOMALIA_V14_DATA_player.weaponDame;
            let reflect = (totalDame * 0.4) * (1 - SOMALIA_V14_DATA_player.dmgReduction);
            
            SOMALIA_V14_DATA_player.hp -= reflect;
            SOMALIA_V14_DATA_player.gold += gold;
            alert(`Bạn đã đánh bại ${name}, nhận được ${gold}$!`);
            
            saveGame();
            renderGame();
        }

        function buy(name, cost, dame) {
            if(SOMALIA_V14_DATA_player.gold >= cost) {
                SOMALIA_V14_DATA_player.gold -= cost;
                SOMALIA_V14_DATA_player.weaponDame = dame;
                alert(`Đã mua ${name}!`);
                saveGame();
                renderGame();
            } else {
                alert("Không đủ tiền!");
            }
        }

        function saveGame() {
            localStorage.setItem('myRPG_Data', JSON.stringify(SOMALIA_V14_DATA_player));
        }
    </script>
</body>
</html>
