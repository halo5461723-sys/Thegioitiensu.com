<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RPG Game Full</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .hidden { display: none !important; } /* Quan trọng: !important để ẩn triệt để */
        .box { border: 1px solid #444; padding: 15px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h2>Đăng nhập / Đăng ký</h2>
        <input id="user" placeholder="Tài khoản"><br>
        <input id="pass" type="password" placeholder="Mật khẩu"><br>
        <button onclick="login()">Vào game</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="box" id="stats"></div>
        <div class="box" id="monster-list"></div>
        <div class="box" id="shop-list"></div>
        <button onclick="logout()">Đăng xuất</button>
    </div>

    <script>
        let SOMALIA_V14_DATA_player = null;
        let currentUserId = "";

        function login() {
            let u = document.getElementById('user').value;
            let p = document.getElementById('pass').value;
            if(!u || !p) return alert("Nhập đủ TK/MK");
            
            currentUserId = u + "_" + p;
            SOMALIA_V14_DATA_player = JSON.parse(localStorage.getItem(currentUserId)) || {
                name: u, hp: 100, baseDame: 10, gold: 0, weaponDame: 0
            };

            // ẨN HẾT màn hình đăng nhập, HIỆN màn hình game
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderGame();
        }

        function logout() {
            localStorage.setItem(currentUserId, JSON.stringify(SOMALIA_V14_DATA_player));
            location.reload(); // Reset lại trang
        }

        function renderGame() {
            document.getElementById('stats').innerHTML = `TK: ${SOMALIA_V14_DATA_player.name} | Vàng: ${SOMALIA_V14_DATA_player.gold}$ | HP: ${SOMALIA_V14_DATA_player.hp.toFixed(0)}`;
            
            // Danh sách quái
            document.getElementById('monster-list').innerHTML = `
                <h3>Săn quái:</h3>
                <button onclick="fight(10, 50, 'Slime')">Slime (+50$)</button>
                <button onclick="fight(100, 500, 'Vua Slime')">Vua Slime (+500$)</button>
            `;

            // Shop
            document.getElementById('shop-list').innerHTML = `
                <h3>Shop vũ khí:</h3>
                <button onclick="buy('Cây gậy', 50, 12)">Gậy (50$) - 12 dame</button>
                <button onclick="buy('Kiếm sắt', 250, 30)">Kiếm (250$) - 30 dame</button>
            `;
        }

        function fight(hp, gold, name) {
            SOMALIA_V14_DATA_player.gold += gold;
            alert("Đã diệt " + name + "! Nhận " + gold + "$");
            save(); renderGame();
        }

        function buy(name, cost, dame) {
            if(SOMALIA_V14_DATA_player.gold >= cost) {
                SOMALIA_V14_DATA_player.gold -= cost;
                SOMALIA_V14_DATA_player.weaponDame = dame;
                save(); renderGame();
                alert("Đã mua " + name);
            } else alert("Không đủ tiền!");
        }

        function save() { localStorage.setItem(currentUserId, JSON.stringify(SOMALIA_V14_DATA_player)); }
    </script>
</body>
</html>
